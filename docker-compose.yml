services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - S3_ENDPOINT=http://garage:3900
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=password
      - S3_BUCKET=doc-cache
      - REDIS_HOST=redis
      - UPSTREAM_URL=http://host.docker.internal:8000
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
