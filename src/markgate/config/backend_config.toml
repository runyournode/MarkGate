# backend_config.toml — MarkGate backend configuration
#
# Each entry under [backends.*] declares one processing version exposed
# on the PUT /md/{version}/process endpoint.
#
# API keys are referenced via ${VAR_NAME} and resolved from .env_secret
# (or real environment variables). The application will refuse to start if any
# referenced variable is missing.
#
# backend_type must match a registered handler in backends/BACKEND_HANDLERS:
#   "foil"    — Foil-serve (raw bytes POST, optional VLM image description)
#   "docling" — Docling-serve (multipart POST, rich OCR/layout options)
#
# cache_id: optional stable S3 cache key. When renaming a backend entry,
#   set cache_id to the old name to preserve existing cached results.
#   Example: renaming "docling-v2" to "docling" → set cache_id = "docling-v2"


# ---------------------------------------------------------------------------
# Foil — basic, no VLM
# ---------------------------------------------------------------------------

[backends.foil]
description = "Foil-serve — no image description"
backend_type = "foil"
cache_id = "foil"
upstream_url = "http://localhost:8081/v1/process"
authorized_api_key = "${CLIENT_API_KEY_FOIL}"

[backends.foil.custom_headers]
Authorization = "Bearer ${UPSTREAM_FOIL_API_KEY}"


# ---------------------------------------------------------------------------
# Foil — with Ministral-3B VLM image description
# ---------------------------------------------------------------------------

[backends.foil-ministral-3-3b]
description = "Foil-serve with Ministral-3-3B image description"
backend_type = "foil"
cache_id = "foil-ministral-3-3b"
upstream_url = "http://localhost:8081"
authorized_api_key = "${CLIENT_API_KEY_FOIL_MINISTRAL_3_3B}"

[backends.foil-ministral-3-3b.custom_headers]
Authorization = "Bearer ${UPSTREAM_FOIL_API_KEY}"

[backends.foil-ministral-3-3b.query_params]
image_description_model_name = "ministral-3-3b"


