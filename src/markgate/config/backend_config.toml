# ---------------------------------------------------------------------------
# Docling — standard OCR, no image description
# ---------------------------------------------------------------------------

[backends.docling]
backend_type = "docling"
description = "Docling-serve — standard OCR with tesseract"
upstream_url = "http://docling-serve:5001"
authorized_api_key = "${CLIENT_API_KEY_DOCLING}"

[backends.docling.custom_headers]
X-Api-Key = "${UPSTREAM_DOCLING_API_KEY}"

[backends.docling.query_params]
to_formats = ["md"]
image_export_mode = "placeholder"
include_images = false
do_ocr = true
force_ocr = true
ocr_engine = "tesseract"
ocr_lang = ["en", "fr"]
pdf_backend = "dlparse_v2"
table_mode = "accurate"
do_formula_enrichment = true


# ---------------------------------------------------------------------------
# Docling — with image description via OpenAI-compatible VLM API
# ---------------------------------------------------------------------------

[backends.docling-vl]
backend_type = "docling"
description = "Docling-serve with Ministral-3B image description via vLLM"
upstream_url = "http://docling-serve:5001"
authorized_api_key = "${CLIENT_API_KEY_DOCLING_VL}"

[backends.docling-vl.custom_headers]
X-Api-Key = "${UPSTREAM_DOCLING_API_KEY}"

[backends.docling-vl.query_params]
to_formats = ["md"]
image_export_mode = "placeholder"
include_images = false
do_ocr = true
force_ocr = true
ocr_engine = "tesseract"
ocr_lang = ["en", "fr"]
pdf_backend = "dlparse_v2"
table_mode = "accurate"
do_formula_enrichment = true
do_picture_description = true
picture_description_area_threshold = 0.01

[backends.docling-vl.query_params.picture_description_api]
url = "http://vlm-server:8000/v1/chat/completions"
timeout = 60
concurrency = 10

[backends.docling-vl.query_params.picture_description_api.headers]
Authorization = "Bearer ${UPSTREAM_VLM_API_KEY}"

[backends.docling-vl.query_params.picture_description_api.params]
model = "ministral-3b"
max_completion_tokens = 500